<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Data Portfolio{% endif %}</title>
  <meta name="description" content="{{ page.summary | default: site.description | strip_html | truncate: 160 }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="{{ page.body_class | default: 'page-home' }}">

  <header class="site-nav" id="top">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">NS</span>
        <span class="brand-name">Nikolas&nbsp;Scevko</span>
      </a>
      <nav class="nav-links">
        <a href="{{ '/' | relative_url }}#projects">Projects</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
        <a class="nav-cta" href="{{ site.resume_url | relative_url }}" target="_blank" rel="noopener">Resume&nbsp;↓</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer" id="contact">
    <div class="footer-inner">
      <p class="footer-kicker kicker">get in touch</p>
      <h2 class="footer-title">Let’s talk data.</h2>
      <p class="footer-sub">Open to data science &amp; analytics opportunities in {{ site.location }} and remote.</p>
      <div class="footer-links">
        <a href="mailto:{{ site.email }}">{{ site.email }}</a>
        <a href="{{ site.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ site.resume_url | relative_url }}" target="_blank" rel="noopener">Resume</a>
      </div>
      <p class="footer-fine">© 2026 Nikolas Scevko · {{ site.location }} · Built by hand, no template.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
